<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>AR Street Art Test 05 - Visjes</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
    }

    a-scene {
      position: fixed !important;
      inset: 0;
      width: 100vw !important;
      height: 100vh !important;
    }

    canvas, video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
    }

    .overlay-text {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 20;
      color: white;
      background: rgba(0, 0, 0, 0.42);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      width: calc(100% - 40px);
      max-width: 360px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="overlay-text">Richt je camera op het artwork</div>

  <a-scene
    embedded
    mindar-image="imageTargetSrc: under-construction-targets.mind; autoStart: true; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets></a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- WATERBASIS IN DE PUT -->
      <a-circle
        position="0.00 -0.31 0.01"
        radius="0.18"
        rotation="-90 0 0"
        color="#00aaff"
        opacity="0.30"
        animation__pulse="property: scale; to: 1.04 1.04 1.04; dir: alternate; dur: 1800; loop: true; easing: easeInOutSine">
      </a-circle>

      <a-ring
        position="0.00 -0.31 0.02"
        rotation="-90 0 0"
        radius-inner="0.07"
        radius-outer="0.19"
        color="#6fe6ff"
        opacity="0.22"
        animation__pulse="property: scale; to: 1.08 1.08 1.08; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine">
      </a-ring>

      <a-circle
        position="0.00 -0.31 0.03"
        radius="0.10"
        rotation="-90 0 0"
        color="#baf7ff"
        opacity="0.14"
        animation__pulse="property: scale; to: 1.10 1.10 1.10; dir: alternate; dur: 1200; loop: true; easing: easeInOutSine">
      </a-circle>

      <!-- EXTRA RAND-GLOWS LINKS/RECHTS IN DE PUT -->
      <a-sphere
        position="-0.10 -0.28 0.02"
        radius="0.010"
        color="#7fe9ff"
        opacity="0.65"
        animation__blink="property: opacity; to: 0.18; dir: alternate; dur: 900; loop: true">
      </a-sphere>

      <a-sphere
        position="0.11 -0.27 0.02"
        radius="0.011"
        color="#38dfff"
        opacity="0.58"
        animation__blink="property: opacity; to: 0.14; dir: alternate; dur: 1100; loop: true">
      </a-sphere>

      <!-- BUBBELKOLOM - KERN -->
      <a-sphere
        position="0.00 -0.24 0.06"
        radius="0.022"
        color="#25b9ff"
        opacity="0.90"
        animation__rise="property: position; to: 0.00 0.55 0.06; dur: 2600; loop: true; easing: easeOutSine"
        animation__pulse="property: scale; to: 1.14 1.14 1.14; dir: alternate; dur: 900; loop: true">
      </a-sphere>

      <a-sphere
        position="-0.03 -0.18 0.07"
        radius="0.016"
        color="#49caff"
        opacity="0.86"
        animation__rise="property: position; to: -0.04 0.48 0.07; dur: 2200; loop: true; easing: easeOutSine"
        animation__pulse="property: scale; to: 1.18 1.18 1.18; dir: alternate; dur: 800; loop: true">
      </a-sphere>

      <a-sphere
        position="0.04 -0.14 0.07"
        radius="0.028"
        color="#1ea8ff"
        opacity="0.82"
        animation__rise="property: position; to: 0.05 0.66 0.07; dur: 3000; loop: true; easing: easeOutSine"
        animation__pulse="property: scale; to: 1.10 1.10 1.10; dir: alternate; dur: 1100; loop: true">
      </a-sphere>

      <a-sphere
        position="-0.05 -0.08 0.08"
        radius="0.012"
        color="#97e8ff"
        opacity="0.92"
        animation__rise="property: position; to: -0.08 0.40 0.08; dur: 1700; loop: true; easing: easeOutSine"
        animation__pulse="property: scale; to: 1.20 1.20 1.20; dir: alternate; dur: 700; loop: true">
      </a-sphere>

      <a-sphere
        position="0.02 -0.02 0.08"
        radius="0.020"
        color="#52d4ff"
        opacity="0.86"
        animation__rise="property: position; to: 0.01 0.44 0.08; dur: 2100; loop: true; easing: easeOutSine"
        animation__pulse="property: scale; to: 1.16 1.16 1.16; dir: alternate; dur: 850; loop: true">
      </a-sphere>

      <a-sphere
        position="-0.07 0.00 0.09"
        radius="0.030"
        color="#24b0ff"
        opacity="0.78"
        animation__rise="property: position; to: -0.10 0.74 0.09; dur: 3400; loop: true; easing: easeOutSine"
        animation__pulse="property: scale; to: 1.10 1.10 1.10; dir: alternate; dur: 1200; loop: true">
      </a-sphere>

      <a-sphere
        position="0.08 0.02 0.09"
        radius="0.014"
        color="#9bf0ff"
        opacity="0.88"
        animation__rise="property: position; to: 0.11 0.46 0.09; dur: 1900; loop: true; easing: easeOutSine"
        animation__pulse="property: scale; to: 1.18 1.18 1.18; dir: alternate; dur: 750; loop: true">
      </a-sphere>

      <a-sphere
        position="0.00 0.08 0.10"
        radius="0.024"
        color="#3ec7ff"
        opacity="0.82"
        animation__rise="property: position; to: -0.01 0.78 0.10; dur: 2800; loop: true; easing: easeOutSine"
        animation__pulse="property: scale; to: 1.14 1.14 1.14; dir: alternate; dur: 980; loop: true">
      </a-sphere>

      <a-sphere
        position="-0.02 0.16 0.10"
        radius="0.034"
        color="#29b6ff"
        opacity="0.76"
        animation__rise="property: position; to: 0.00 0.95 0.10; dur: 3600; loop: true; easing: easeOutSine"
        animation__pulse="property: scale; to: 1.12 1.12 1.12; dir: alternate; dur: 1300; loop: true">
      </a-sphere>

      <a-sphere
        position="0.05 0.24 0.11"
        radius="0.018"
        color="#83ebff"
        opacity="0.84"
        animation__rise="property: position; to: 0.09 1.02 0.11; dur: 2400; loop: true; easing: easeOutSine"
        animation__pulse="property: scale; to: 1.16 1.16 1.16; dir: alternate; dur: 860; loop: true">
      </a-sphere>

      <a-sphere
        position="-0.04 0.30 0.11"
        radius="0.026"
        color="#37c4ff"
        opacity="0.80"
        animation__rise="property: position; to: -0.09 1.10 0.11; dur: 3100; loop: true; easing: easeOutSine"
        animation__pulse="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 1000; loop: true">
      </a-sphere>

      <!-- EXTRA BUBBELS IN DE BREEDTE / KELK -->
      <a-sphere
        position="-0.18 0.78 0.12"
        radius="0.020"
        color="#46d1ff"
        opacity="0.84"
        animation__float="property: position; to: -0.26 1.08 0.12; dir: alternate; dur: 2200; loop: true; easing: easeInOutSine">
      </a-sphere>

      <a-sphere
        position="-0.10 0.82 0.12"
        radius="0.030"
        color="#25b8ff"
        opacity="0.82"
        animation__float="property: position; to: -0.16 1.12 0.12; dir: alternate; dur: 2600; loop: true; easing: easeInOutSine">
      </a-sphere>

      <a-sphere
        position="0.12 0.84 0.12"
        radius="0.022"
        color="#61dfff"
        opacity="0.84"
        animation__float="property: position; to: 0.20 1.12 0.12; dir: alternate; dur: 2400; loop: true; easing: easeInOutSine">
      </a-sphere>

      <a-sphere
        position="0.22 0.90 0.12"
        radius="0.016"
        color="#8cecff"
        opacity="0.82"
        animation__float="property: position; to: 0.30 1.16 0.12; dir: alternate; dur: 2100; loop: true; easing: easeInOutSine">
      </a-sphere>

      <a-sphere
        position="-0.28 0.92 0.12"
        radius="0.014"
        color="#8feeff"
        opacity="0.80"
        animation__float="property: position; to: -0.36 1.18 0.12; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
      </a-sphere>

      <a-sphere
        position="0.00 0.92 0.12"
        radius="0.018"
        color="#71e7ff"
        opacity="0.82"
        animation__float="property: position; to: 0.00 1.20 0.12; dir: alternate; dur: 1800; loop: true; easing: easeInOutSine">
      </a-sphere>

      <!-- KLEINE SPRANKELS -->
      <a-sphere
        position="0.10 -0.10 0.05"
        radius="0.006"
        color="#ffffff"
        opacity="0.95"
        animation__twinkle="property: opacity; to: 0.18; dir: alternate; dur: 550; loop: true">
      </a-sphere>

      <a-sphere
        position="-0.12 0.12 0.05"
        radius="0.005"
        color="#9fefff"
        opacity="0.80"
        animation__twinkle="property: opacity; to: 0.10; dir: alternate; dur: 700; loop: true">
      </a-sphere>

      <a-sphere
        position="0.12 0.28 0.05"
        radius="0.007"
        color="#6fdcff"
        opacity="0.82"
        animation__twinkle="property: opacity; to: 0.08; dir: alternate; dur: 620; loop: true">
      </a-sphere>

      <a-sphere
        position="-0.10 0.40 0.05"
        radius="0.006"
        color="#c6f7ff"
        opacity="0.78"
        animation__twinkle="property: opacity; to: 0.12; dir: alternate; dur: 800; loop: true">
      </a-sphere>

      <!-- VISJE 1 -->
      <a-entity
        position="-0.05 -0.20 0.10"
        animation__jump="property: position; to: -0.20 0.18 0.10; dir: alternate; dur: 1800; loop: true; easing: easeInOutSine"
        animation__spin="property: rotation; to: 0 0 -25; dir: alternate; dur: 900; loop: true; easing: easeInOutSine">
        <a-ellipsoid
          radius="0.030 0.014 0.010"
          color="#ffb347"
          opacity="0.96">
        </a-ellipsoid>
        <a-triangle
          vertex-a="-0.030 0 0"
          vertex-b="-0.055 0.020 0"
          vertex-c="-0.055 -0.020 0"
          color="#ff8b2b"
          opacity="0.96">
        </a-triangle>
      </a-entity>

      <!-- VISJE 2 -->
      <a-entity
        position="0.06 -0.18 0.10"
        animation__jump="property: position; to: 0.22 0.14 0.10; dir: alternate; dur: 2200; loop: true; easing: easeInOutSine"
        animation__spin="property: rotation; to: 0 0 30; dir: alternate; dur: 1000; loop: true; easing: easeInOutSine">
        <a-ellipsoid
          radius="0.026 0.012 0.010"
          color="#ffd166"
          opacity="0.95">
        </a-ellipsoid>
        <a-triangle
          vertex-a="-0.026 0 0"
          vertex-b="-0.050 0.018 0"
          vertex-c="-0.050 -0.018 0"
          color="#ff9f1c"
          opacity="0.95">
        </a-triangle>
      </a-entity>

      <!-- VISJE 3 -->
      <a-entity
        position="0.00 -0.14 0.11"
        animation__jump="property: position; to: 0.00 0.28 0.11; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"
        animation__spin="property: rotation; to: 0 0 -18; dir: alternate; dur: 850; loop: true; easing: easeInOutSine">
        <a-ellipsoid
          radius="0.022 0.010 0.010"
          color="#ffcf5a"
          opacity="0.94">
        </a-ellipsoid>
        <a-triangle
          vertex-a="-0.022 0 0"
          vertex-b="-0.042 0.015 0"
          vertex-c="-0.042 -0.015 0"
          color="#ff8f3d"
          opacity="0.94">
        </a-triangle>
      </a-entity>

    </a-entity>
  </a-scene>
</body>
</html>
