<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>T-Rex AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; }
.overlay {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.5);
  color:white;
  padding:10px 15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="overlay">Richt op de T-Rex 🦖</div>

<a-scene
  embedded
  mindar-image="imageTargetSrc: trex.mind; autoStart: true;"
  color-space="sRGB"
  renderer="colorManagement: true; alpha:true"
  vr-mode-ui="enabled:false"
>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">

  <!-- MIST UIT DE BEK -->
  <a-sphere
    position="0 0.2 0.1"
    radius="0.05"
    color="#ffffff"
    opacity="0.4"
    animation="property: position; to: 0 0.6 0.2; loop: true; dur: 2000"
  ></a-sphere>

  <a-sphere
    position="0.1 0.2 0.1"
    radius="0.03"
    color="#d0f0ff"
    opacity="0.5"
    animation="property: position; to: 0.2 0.5 0.2; loop: true; dur: 1800"
  ></a-sphere>

  <!-- PARTICLES -->
  <a-sphere position="-0.1 0.3 0.1" radius="0.02" color="#00ccff"
    animation="property: position; to: -0.2 0.7 0.2; loop: true; dur: 2200">
  </a-sphere>

  <a-sphere position="0.15 0.4 0.1" radius="0.015" color="#66e0ff"
    animation="property: position; to: 0.3 0.8 0.2; loop: true; dur: 2000">
  </a-sphere>

  <!-- GLOW IN MOND -->
  <a-sphere
    position="0 0.15 0.05"
    radius="0.04"
    color="#ff3300"
    opacity="0.6"
    animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop:true; dur:800"
  ></a-sphere>

</a-entity>

</a-scene>

</body>
</html>
