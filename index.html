<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>AR Street Art Test 02</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
    }

    a-scene {
      position: fixed !important;
      inset: 0;
      width: 100vw !important;
      height: 100vh !important;
    }

    canvas, video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
    }

    .overlay-text {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 20;
      color: white;
      background: rgba(0, 0, 0, 0.42);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      width: calc(100% - 40px);
      max-width: 360px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="overlay-text">Richt je camera op het artwork</div>

  <a-scene
    embedded
    mindar-image="imageTargetSrc: under-construction-targets.mind; autoStart: true; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets></a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Bubbelcluster bij de pijp / waterzone -->
      <a-sphere
        position="-0.34 -0.24 0.02"
        radius="0.030"
        color="#dff9ff"
        opacity="0.45"
        animation__rise="property: position; to: -0.28 0.22 0.02; dur: 2500; loop: true; easing: easeInOutSine"
        animation__pulse="property: scale; dir: alternate; dur: 1100; loop: true; to: 1.08 1.08 1.08">
      </a-sphere>

      <a-sphere
        position="-0.28 -0.20 0.02"
        radius="0.020"
        color="#bfefff"
        opacity="0.40"
        animation__rise="property: position; to: -0.22 0.18 0.02; dur: 1800; loop: true; easing: easeInOutSine"
        animation__pulse="property: scale; dir: alternate; dur: 900; loop: true; to: 1.15 1.15 1.15">
      </a-sphere>

      <a-sphere
        position="-0.22 -0.18 0.02"
        radius="0.040"
        color="#9fe7ff"
        opacity="0.38"
        animation__rise="property: position; to: -0.15 0.28 0.02; dur: 3000; loop: true; easing: easeInOutSine"
        animation__pulse="property: scale; dir: alternate; dur: 1400; loop: true; to: 1.10 1.10 1.10">
      </a-sphere>

      <a-sphere
        position="-0.16 -0.12 0.02"
        radius="0.024"
        color="#d8f7ff"
        opacity="0.48"
        animation__rise="property: position; to: -0.10 0.20 0.02; dur: 2100; loop: true; easing: easeInOutSine"
        animation__pulse="property: scale; dir: alternate; dur: 1000; loop: true; to: 1.12 1.12 1.12">
      </a-sphere>

      <a-sphere
        position="-0.30 -0.06 0.02"
        radius="0.016"
        color="#eefcff"
        opacity="0.52"
        animation__rise="property: position; to: -0.26 0.12 0.02; dur: 1600; loop: true; easing: easeInOutSine"
        animation__pulse="property: scale; dir: alternate; dur: 800; loop: true; to: 1.18 1.18 1.18">
      </a-sphere>

      <a-sphere
        position="-0.12 -0.24 0.02"
        radius="0.028"
        color="#c9f2ff"
        opacity="0.36"
        animation__rise="property: position; to: -0.05 0.16 0.02; dur: 2400; loop: true; easing: easeInOutSine"
        animation__pulse="property: scale; dir: alternate; dur: 1200; loop: true; to: 1.10 1.10 1.10">
      </a-sphere>

      <a-sphere
        position="-0.18 -0.30 0.02"
        radius="0.014"
        color="#f4feff"
        opacity="0.55"
        animation__rise="property: position; to: -0.14 0.10 0.02; dur: 1700; loop: true; easing: easeInOutSine"
        animation__pulse="property: scale; dir: alternate; dur: 700; loop: true; to: 1.20 1.20 1.20">
      </a-sphere>

      <a-sphere
        position="-0.08 -0.10 0.02"
        radius="0.018"
        color="#a8e8ff"
        opacity="0.42"
        animation__rise="property: position; to: 0.00 0.24 0.02; dur: 2200; loop: true; easing: easeInOutSine"
        animation__pulse="property: scale; dir: alternate; dur: 950; loop: true; to: 1.16 1.16 1.16">
      </a-sphere>

      <a-sphere
        position="-0.24 -0.28 0.02"
        radius="0.034"
        color="#d4f6ff"
        opacity="0.34"
        animation__rise="property: position; to: -0.20 0.14 0.02; dur: 2700; loop: true; easing: easeInOutSine"
        animation__pulse="property: scale; dir: alternate; dur: 1300; loop: true; to: 1.08 1.08 1.08">
      </a-sphere>

    </a-entity>
  </a-scene>
</body>
</html>
